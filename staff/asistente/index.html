<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <title>Asistente · SuscripFy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/staff/asistente/asistente.css">
</head>
<body>
  <main class="sf-staff-shell">

    <section id="sf-staff-login-view" class="sf-staff-view" hidden>
      <div class="sf-staff-card">
        <div class="sf-staff-brand">
          <svg width="36" height="36" viewBox="0 0 36 36" aria-hidden="true">
            <rect width="36" height="36" rx="9" fill="#2563EB"/>
            <text x="7" y="25" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="800" fill="#fff">S</text>
            <text x="18" y="25" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="700" font-style="italic" fill="#93C5FD">Fy</text>
          </svg>
          <div class="sf-staff-brand__title">Asistente interno</div>
        </div>
        <form id="sf-staff-login-form" novalidate>
          <label class="sf-staff-field">
            <span class="sf-staff-field__label">Correo</span>
            <input type="email" id="sf-staff-email" name="email" autocomplete="email" required>
          </label>
          <label class="sf-staff-field">
            <span class="sf-staff-field__label">Contraseña</span>
            <input type="password" id="sf-staff-password" name="password" autocomplete="current-password" required>
          </label>
          <div id="sf-staff-login-error" class="sf-staff-error" hidden></div>
          <button type="submit" id="sf-staff-login-btn" class="sf-staff-btn sf-staff-btn--primary">
            <span class="sf-staff-btn__label">Entrar</span>
          </button>
        </form>
      </div>
    </section>

    <section id="sf-staff-chat-view" class="sf-staff-view" hidden>
      <header class="sf-staff-header">
        <div class="sf-staff-header__title">Asistente interno · SuscripFy</div>
        <div class="sf-staff-header__actions">
          <button type="button" id="sf-staff-new" class="sf-staff-icon-btn" title="Nueva conversación" aria-label="Nueva conversación">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/></svg>
          </button>
          <button type="button" id="sf-staff-logout" class="sf-staff-icon-btn" title="Salir" aria-label="Salir">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>
      <div id="sf-staff-messages" class="sf-staff-messages" aria-live="polite"></div>
      <form id="sf-staff-chat-form" class="sf-staff-composer">
        <textarea id="sf-staff-input" rows="1" placeholder="Pega aquí la pregunta del cliente…" maxlength="2000"></textarea>
        <button type="submit" id="sf-staff-send" class="sf-staff-btn sf-staff-btn--primary sf-staff-btn--send" aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </section>

  </main>
  <script src="/staff/asistente/asistente.js"></script>
</body>
</html>
